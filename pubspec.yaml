name: tavli
description: Premium Greek backgammon (Τάβλι) with photorealistic boards and AI opponent Μιχαήλ.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Game engine
  flame: ^1.14.0
  flame_audio: ^2.1.0

  # State management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0

  # Navigation
  go_router: ^13.0.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.0

  # Local database
  drift: ^2.14.0
  sqlite3_flutter_libs: ^0.5.0

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.0
  cloud_firestore: ^5.2.0
  firebase_messaging: ^15.2.10
  # firebase_analytics: ^10.8.0
  # firebase_crashlytics: ^3.4.0
  # firebase_storage: ^11.5.0

  # AI model inference
  tflite_flutter: ^0.10.4

  # Networking
  dio: ^5.4.0

  # QR codes
  mobile_scanner: ^4.0.0
  qr_flutter: ^4.1.0

  # Audio
  just_audio: ^0.9.36

  # Sharing
  share_plus: ^7.2.0

  # Auth providers
  google_sign_in: ^6.3.0
  # sign_in_with_apple: ^6.1.0

  # Code generation support
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.0

  # Utilities
  equatable: ^2.0.5
  uuid: ^4.2.0
  collection: ^1.18.0
  intl: ^0.20.2
  google_fonts: ^8.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
  json_serializable: ^6.7.0
  riverpod_generator: ^2.3.0
  drift_dev: ^2.14.0
  hive_generator: ^2.0.1
  mockito: ^5.4.0
  mocktail: ^1.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/icons/app_icon.png"
  adaptive_icon_foreground: "assets/images/icons/app_icon_foreground.png"
  adaptive_icon_background: "#6B4F3A"
  min_sdk_android: 21

flutter:
  generate: true
  uses-material-design: true

  assets:
    - assets/images/boards/
    - assets/images/checkers/
    - assets/images/dice/
    - assets/images/mikhail/
    - assets/images/icons/
    - assets/images/backgrounds/
    - assets/audio/sfx/
    - assets/audio/music/
    - assets/audio/voice/
    - assets/fonts/
    - assets/ai_models/
    - assets/animations/

